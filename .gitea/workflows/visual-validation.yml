name: OpenCode Visual Validation Capture

"on":
  workflow_call:
    inputs:
      pull_request_number:
        description: Pull request number to generate visual validation for
        required: true
        type: string
      head_sha:
        description: Expected pull request head SHA to validate
        required: true
        type: string
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to generate visual validation for
        required: true
      head_sha:
        description: Expected pull request head SHA to validate
        required: true

permissions:
  contents: read

jobs:
  visual-validation:
    runs-on: macos-ultramac
    timeout-minutes: 15
    env:
      GIT_SSL_NO_VERIFY: "1"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      OPENCODE_MANAGED_CONFIG: "project/opencode-managed.json"
      OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE: "git.ultramac.work/eugene/opencode-gitea-automation/playwright-evidence-runner:1.54.0-r1"
      OPENCODE_REPO_OWNER: ${{ secrets.OPENCODE_REPO_OWNER }}
      OPENCODE_REPO_NAME: ${{ secrets.OPENCODE_REPO_NAME }}
      OPENCODE_PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
      OPENCODE_HEAD_SHA: ${{ inputs.head_sha }}
      GITEA_TOKEN: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
    steps:
      - name: Allow internal self-signed Git over HTTPS
        run: git config --global http.sslVerify false

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha }}
          fetch-depth: 0

      - name: Load managed visual validation settings
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import ssl
          import subprocess
          import urllib.request
          from pathlib import Path

          def resolve_issue_number(owner, repo, pull_request_number):
              if not owner or not repo or not pull_request_number:
                  return None
              token = os.environ.get("GITEA_TOKEN", "").strip()
              request = urllib.request.Request(
                  f"https://git.ultramac.work/api/v1/repos/{owner}/{repo}/pulls/{pull_request_number}",
                  headers={"Accept": "application/json"},
              )
              if token:
                  request.add_header("Authorization", f"token {token}")
              context = ssl._create_unverified_context() if os.environ.get("GIT_SSL_NO_VERIFY") == "1" else None
              try:
                  with urllib.request.urlopen(request, timeout=10, context=context) as response:
                      pull = json.loads(response.read().decode("utf-8"))
              except Exception as error:
                  print(f"Unable to resolve pull request issue for visual validation gating: {error}")
                  return None
              values = [
                  str(pull.get("head", {}).get("ref", "")),
                  str(pull.get("head", {}).get("label", "")),
                  str(pull.get("title", "")),
                  str(pull.get("body", "")),
              ]
              for value in values:
                  match = re.search(r"(?:^|[^0-9])(\d+)(?:[-_/]|$)", value)
                  if match:
                      return match.group(1)
              return None

          def spec_has_visual_validation(text):
              for line in text.splitlines():
                  if line.strip() == "## Visual Validation":
                      return True
              return False

          def spec_requests_visual_validation(issue_number, head_sha):
              if not issue_number:
                  return True
              specs_dir = Path("docs/specs/issues")
              for spec_path in sorted(specs_dir.glob(f"{issue_number}-*.md")):
                  return spec_has_visual_validation(spec_path.read_text(encoding="utf-8"))
              if head_sha:
                  try:
                      listing = subprocess.check_output(
                          ["git", "ls-tree", "-r", "--name-only", head_sha, "docs/specs/issues"],
                          text=True,
                          stderr=subprocess.DEVNULL,
                      )
                      for candidate in listing.splitlines():
                          if Path(candidate).name.startswith(f"{issue_number}-") and candidate.endswith(".md"):
                              spec_text = subprocess.check_output(
                                  ["git", "show", f"{head_sha}:{candidate}"],
                                  text=True,
                                  stderr=subprocess.DEVNULL,
                              )
                              return spec_has_visual_validation(spec_text)
                  except Exception as error:
                      print(f"Unable to inspect PR head spec for visual validation gating: {error}")
              print(f"No linked issue spec found for visual validation gating: issue {issue_number}")
              return True

          config = json.loads(Path("project/opencode-managed.json").read_text(encoding="utf-8"))
          assert config["schema_version"] == 1
          controller = config["controller"]
          assert controller["repository"]
          assert controller["setup_branch"]
          review = config["review"]
          assert review["persona"]
          assert review["persona_token_secret"].startswith("OPENCODE_PERSONA_")
          validation = config["validation"]
          assert validation["workflow"] == ".gitea/workflows/pr-tests.yml"
          preview = config["preview"]
          assert isinstance(preview["supported"], bool)
          visual_validation = config["visual_validation"]
          assert visual_validation["workflow"] == ".gitea/workflows/visual-validation.yml"
          assert isinstance(visual_validation["supported"], bool)
          assert visual_validation["provider"]
          assert visual_validation["platform"]
          assert visual_validation["full_page"] is True
          visual_provider = str(visual_validation["provider"]).strip()
          visual_platform = str(visual_validation["platform"]).strip()
          visual_playwright_web = visual_provider == "playwright" and visual_platform == "web"
          visual_native_macos = visual_provider in {"native-macos", "native", "macos"} and visual_platform in {"macos", "native-macos"}
          visual_native_ios_simulator = visual_provider in {"native-ios-simulator", "ios-simulator", "native-ios", "ios"} and visual_platform in {"ios-simulator", "ios", "simulator"}
          owner = os.environ["OPENCODE_REPO_OWNER"].strip()
          repo = os.environ["OPENCODE_REPO_NAME"].strip()
          issue_number = resolve_issue_number(owner, repo, os.environ.get("OPENCODE_PULL_REQUEST_NUMBER", "").strip())
          visual_spec_required = spec_requests_visual_validation(issue_number, os.environ.get("OPENCODE_HEAD_SHA", "").strip())
          visual_evidence_supported = (
              visual_validation["supported"] is True
              and visual_spec_required
              and (visual_playwright_web or visual_native_macos or visual_native_ios_simulator)
          )
          raw = f"{owner}-{repo}".lower()
          project_key = re.sub(r"[^a-z0-9]+", "-", raw).strip("-")
          project_key = re.sub(r"-{2,}", "-", project_key)
          if not project_key:
              raise SystemExit("Unable to derive project key from repository owner/name")
          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as handle:
              handle.write(f"OPENCODE_CONTROLLER_REPOSITORY={controller['repository']}\n")
              handle.write(f"OPENCODE_SETUP_BRANCH={controller['setup_branch']}\n")
              handle.write(f"OPENCODE_PROJECT_KEY={project_key}\n")
              handle.write(f"OPENCODE_PREVIEW_SUPPORTED={'true' if preview['supported'] else 'false'}\n")
              handle.write(f"OPENCODE_VISUAL_VALIDATION_SUPPORTED={'true' if visual_validation['supported'] else 'false'}\n")
              handle.write(f"OPENCODE_VISUAL_VALIDATION_PROVIDER={visual_provider}\n")
              handle.write(f"OPENCODE_VISUAL_VALIDATION_PLATFORM={visual_platform}\n")
              handle.write(f"OPENCODE_VISUAL_VALIDATION_SPEC_REQUIRED={'true' if visual_spec_required else 'false'}\n")
              handle.write(f"OPENCODE_VISUAL_VALIDATION_EVIDENCE_SUPPORTED={'true' if visual_evidence_supported else 'false'}\n")
              handle.write(f"OPENCODE_VISUAL_VALIDATION_PLAYWRIGHT_WEB={'true' if visual_validation['supported'] is True and visual_playwright_web else 'false'}\n")
              handle.write(f"OPENCODE_VISUAL_VALIDATION_NATIVE_MACOS={'true' if visual_validation['supported'] is True and visual_native_macos else 'false'}\n")
              handle.write(f"OPENCODE_VISUAL_VALIDATION_NATIVE_IOS_SIMULATOR={'true' if visual_validation['supported'] is True and visual_native_ios_simulator else 'false'}\n")
          print("managed visual validation config ok")
          PY

      - name: Skip bootstrap setup PR visual validation workflow
        if: ${{ github.event_name == 'pull_request' && github.head_ref == env.OPENCODE_SETUP_BRANCH }}
        run: echo "Bootstrap setup PR detected; skipping visual validation workflow."

      - name: Skip repositories without visual validation capture support
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_VISUAL_VALIDATION_EVIDENCE_SUPPORTED != 'true' }}
        run: echo "Managed repository does not declare supported visual validation capture; skipping."

      - name: Authenticate shared Playwright evidence runner image pull access
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_PREVIEW_SUPPORTED == 'true' && env.OPENCODE_VISUAL_VALIDATION_PLAYWRIGHT_WEB == 'true' }}
        run: echo "${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}" | docker login git.ultramac.work -u "review-bot" --password-stdin

      - name: Require shared Playwright evidence runner image
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_PREVIEW_SUPPORTED == 'true' && env.OPENCODE_VISUAL_VALIDATION_PLAYWRIGHT_WEB == 'true' }}
        run: |
          if [[ -z "${OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE:-}" ]]; then
            echo "OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE is required for Playwright/web visual validation; host Playwright/node_modules fallback is not supported." >&2
            exit 1
          fi
          docker pull "$OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE"

      - name: Check out controller repository
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_VISUAL_VALIDATION_EVIDENCE_SUPPORTED == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPENCODE_CONTROLLER_REPOSITORY }}
          path: controller
          token: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
          fetch-depth: 0

      - name: Resolve Python with working venv
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_VISUAL_VALIDATION_EVIDENCE_SUPPORTED == 'true' }}
        run: |
          HOST_HOME="$(eval echo "~$(whoami)")"
          echo "HOST_HOME=$HOST_HOME" >> "$GITHUB_ENV"
          echo "$HOST_HOME/.opencode/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          export PATH="$HOST_HOME/.opencode/bin:/opt/homebrew/bin:$PATH"
          source controller/scripts/lib/python_runtime.sh
          opencode_export_python_bin
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          echo "VISUAL_VALIDATION_VENV=$PWD/.visual-validation-venv" >> "$GITHUB_ENV"

      - name: Install controller dependencies
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_VISUAL_VALIDATION_EVIDENCE_SUPPORTED == 'true' }}
        run: |
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -m venv "$VISUAL_VALIDATION_VENV"
          "$VISUAL_VALIDATION_VENV/bin/python" --version
          "$VISUAL_VALIDATION_VENV/bin/python" -m pip install -r controller/shared/requirements.txt

      - name: Configure live preview state access on host runners
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_PREVIEW_SUPPORTED == 'true' && env.OPENCODE_VISUAL_VALIDATION_PLAYWRIGHT_WEB == 'true' }}
        run: |
          if [[ -z "${OPENCODE_STATE_ROOT:-}" ]]; then
            DEFAULT_PREVIEW_STATE_ROOT="${HOST_HOME}/www/10-opencode-gitea-automation-state/preview"
            if [[ -d "${DEFAULT_PREVIEW_STATE_ROOT}" ]]; then
              echo "OPENCODE_STATE_ROOT=${DEFAULT_PREVIEW_STATE_ROOT}" >> "$GITHUB_ENV"
            fi
          fi

          LIVE_CONTROLLER_ROOT="${HOST_HOME}/www/10-opencode-gitea-automation"
          if [[ -d "${LIVE_CONTROLLER_ROOT}" ]]; then
            printf '%s\n' "OPENCODE_PREVIEW_ROUTER_RELOAD_COMMAND=/bin/zsh -lc 'cd ${LIVE_CONTROLLER_ROOT} && docker compose exec -T preview-router caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile'" >> "$GITHUB_ENV"
          fi
      - name: Run visual validation capture worker
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_VISUAL_VALIDATION_EVIDENCE_SUPPORTED == 'true' }}
        run: |
          export HOME="$HOST_HOME"
          export PATH="$HOME/.opencode/bin:/opt/homebrew/bin:$PATH"
          cat > .opencode-visual-validation-project.json <<EOF
          {
            "project_key": "$OPENCODE_PROJECT_KEY",
            "repo_owner": "$OPENCODE_REPO_OWNER",
            "repo_name": "$OPENCODE_REPO_NAME"
          }
          EOF
          "$VISUAL_VALIDATION_VENV/bin/python" controller/scripts/visual_validation_worker.py \
            --repo-root "$PWD" \
            --config "$PWD/.opencode-visual-validation-project.json" \
            --automation-config "$PWD/controller/automation.json" \
            --event-name "$GITHUB_EVENT_NAME" \
            --event-path "$GITHUB_EVENT_PATH"
