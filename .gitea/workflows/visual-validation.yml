name: OpenCode Visual Validation Capture

"on":
  workflow_call:
    inputs:
      pull_request_number:
        description: Pull request number to generate visual validation for
        required: true
        type: string
      head_sha:
        description: Expected pull request head SHA to validate
        required: true
        type: string
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to generate visual validation for
        required: true
      head_sha:
        description: Expected pull request head SHA to validate
        required: true

permissions:
  contents: read

jobs:
  visual-validation:
    runs-on: macos-ultramac
    timeout-minutes: 15
    env:
      GIT_SSL_NO_VERIFY: "1"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      OPENCODE_MANAGED_CONFIG: "project/opencode-managed.json"
      OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE: "git.ultramac.work/eugene/opencode-gitea-automation/playwright-evidence-runner:1.54.0-r1"
      OPENCODE_REPO_OWNER: ${{ secrets.OPENCODE_REPO_OWNER }}
      OPENCODE_REPO_NAME: ${{ secrets.OPENCODE_REPO_NAME }}
      OPENCODE_PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
      OPENCODE_PERSONA_REVIEW_BOT_TOKEN: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
      OPENCODE_CONTROLLER_TOKEN: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
    steps:
      - name: Allow internal self-signed Git over HTTPS
        run: git config --global http.sslVerify false

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha }}
          fetch-depth: 0

      - name: Load managed visual validation settings
        run: |
          python3 scripts/lib/opencode-managed-workflow-context.py --context visual-validation --emit env

      - name: Skip bootstrap setup PR visual validation workflow
        if: ${{ github.event_name == 'pull_request' && github.head_ref == env.OPENCODE_SETUP_BRANCH }}
        run: echo "Bootstrap setup PR detected; skipping visual validation workflow."

      - name: Skip repositories without visual validation capture support
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_VISUAL_VALIDATION_EVIDENCE_SUPPORTED != 'true' }}
        run: echo "Managed repository does not declare supported visual validation capture; skipping."

      - name: Authenticate shared Playwright evidence runner image pull access
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_PREVIEW_SUPPORTED == 'true' && env.OPENCODE_VISUAL_VALIDATION_PLAYWRIGHT_WEB == 'true' }}
        run: echo "${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}" | docker login git.ultramac.work -u "review-bot" --password-stdin

      - name: Require shared Playwright evidence runner image
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_PREVIEW_SUPPORTED == 'true' && env.OPENCODE_VISUAL_VALIDATION_PLAYWRIGHT_WEB == 'true' }}
        run: |
          if [[ -z "${OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE:-}" ]]; then
            echo "OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE is required for Playwright/web visual validation; host Playwright/node_modules fallback is not supported." >&2
            exit 1
          fi
          docker pull "$OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE"

      - name: Check out controller repository
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_VISUAL_VALIDATION_EVIDENCE_SUPPORTED == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPENCODE_CONTROLLER_REPOSITORY }}
          path: controller
          token: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
          fetch-depth: 0

      - name: Resolve Python with working venv
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_VISUAL_VALIDATION_EVIDENCE_SUPPORTED == 'true' }}
        run: |
          HOST_HOME="$(eval echo "~$(whoami)")"
          echo "HOST_HOME=$HOST_HOME" >> "$GITHUB_ENV"
          echo "$HOST_HOME/.opencode/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          export PATH="$HOST_HOME/.opencode/bin:/opt/homebrew/bin:$PATH"
          source controller/scripts/lib/python_runtime.sh
          opencode_export_python_bin
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          echo "VISUAL_VALIDATION_VENV=$PWD/.visual-validation-venv" >> "$GITHUB_ENV"

      - name: Install controller dependencies
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_VISUAL_VALIDATION_EVIDENCE_SUPPORTED == 'true' }}
        run: |
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -m venv "$VISUAL_VALIDATION_VENV"
          "$VISUAL_VALIDATION_VENV/bin/python" --version
          "$VISUAL_VALIDATION_VENV/bin/python" -m pip install -r controller/shared/requirements.txt

      - name: Configure live preview state access on host runners
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_PREVIEW_SUPPORTED == 'true' && env.OPENCODE_VISUAL_VALIDATION_PLAYWRIGHT_WEB == 'true' }}
        run: |
          if [[ -z "${OPENCODE_STATE_ROOT:-}" ]]; then
            DEFAULT_PREVIEW_STATE_ROOT="${HOST_HOME}/www/10-opencode-gitea-automation-state/preview"
            if [[ -d "${DEFAULT_PREVIEW_STATE_ROOT}" ]]; then
              echo "OPENCODE_STATE_ROOT=${DEFAULT_PREVIEW_STATE_ROOT}" >> "$GITHUB_ENV"
            fi
          fi

          LIVE_CONTROLLER_ROOT="${HOST_HOME}/www/10-opencode-gitea-automation"
          if [[ -d "${LIVE_CONTROLLER_ROOT}" ]]; then
            printf '%s\n' "OPENCODE_PREVIEW_ROUTER_RELOAD_COMMAND=/bin/zsh -lc 'cd ${LIVE_CONTROLLER_ROOT} && docker compose exec -T preview-router caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile'" >> "$GITHUB_ENV"
          fi
      - name: Run visual validation capture worker
        if: ${{ (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) && env.OPENCODE_VISUAL_VALIDATION_EVIDENCE_SUPPORTED == 'true' }}
        run: |
          export HOME="$HOST_HOME"
          export PATH="$HOME/.opencode/bin:/opt/homebrew/bin:$PATH"
          OPENCODE_DEFAULT_BRANCH="${GITHUB_BASE_REF:-}"
          if [[ -z "$OPENCODE_DEFAULT_BRANCH" ]]; then
            OPENCODE_DEFAULT_BRANCH="$(git ls-remote --symref origin HEAD | awk '/^ref:/ { sub("refs/heads/", "", $2); print $2; exit }')"
          fi
          if [[ -z "$OPENCODE_DEFAULT_BRANCH" ]]; then
            OPENCODE_DEFAULT_BRANCH="main"
          fi
          export OPENCODE_DEFAULT_BRANCH
          "$VISUAL_VALIDATION_VENV/bin/python" - <<'PY'
          import json
          import os
          from pathlib import Path

          Path(".opencode-visual-validation-project.json").write_text(
              json.dumps(
                  {
                      "project_key": os.environ["OPENCODE_PROJECT_KEY"],
                      "repo_owner": os.environ["OPENCODE_REPO_OWNER"],
                      "repo_name": os.environ["OPENCODE_REPO_NAME"],
                      "default_branch": os.environ["OPENCODE_DEFAULT_BRANCH"],
                  },
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          PY
          "$VISUAL_VALIDATION_VENV/bin/python" controller/scripts/visual_validation_worker.py \
            --repo-root "$PWD" \
            --config "$PWD/.opencode-visual-validation-project.json" \
            --automation-config "$PWD/controller/automation.json" \
            --event-name "$GITHUB_EVENT_NAME" \
            --event-path "$GITHUB_EVENT_PATH"
