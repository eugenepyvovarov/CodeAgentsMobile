name: OpenCode Review

"on":
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  pull_request_review:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to review
        required: true
      head_sha:
        description: Expected pull request head SHA to review
        required: true

permissions:
  contents: read

jobs:
  review-bot:
    runs-on: macos-ultramac-review
    timeout-minutes: 10
    env:
      GIT_SSL_NO_VERIFY: "1"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      OPENCODE_MANAGED_CONFIG: "project/opencode-managed.json"
      OPENCODE_REPO_OWNER: ${{ secrets.OPENCODE_REPO_OWNER }}
      OPENCODE_REPO_NAME: ${{ secrets.OPENCODE_REPO_NAME }}
      OPENCODE_REVIEW_PERSONA: "review-bot"
      OPENCODE_PERSONA_REVIEW_BOT_TOKEN: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
    steps:
      - name: Allow internal self-signed Git over HTTPS
        run: git config --global http.sslVerify false

      - name: Check out repository
        run: |
          TARGET_SHA="$GITHUB_SHA"
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            TARGET_SHA="${{ inputs.head_sha }}"
            if [[ -z "$TARGET_SHA" ]]; then
              echo "workflow_dispatch review requires inputs.head_sha so review runs on the PR head." >&2
              exit 1
            fi
          fi
          umask 077
          cat > "$HOME/.netrc" <<EOF
          machine git.ultramac.work
          login "review-bot"
          password ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
          EOF
          git clone --no-checkout "https://git.ultramac.work/${OPENCODE_REPO_OWNER}/${OPENCODE_REPO_NAME}.git" repo
          cd repo
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'
          if ! git checkout --detach "$TARGET_SHA"; then
            git fetch --no-tags origin "$TARGET_SHA"
            git checkout --detach "$TARGET_SHA"
          fi
          rm -f "$HOME/.netrc"
          CURRENT_HEAD="$(git rev-parse HEAD)"
          if [[ "$CURRENT_HEAD" != "$TARGET_SHA" ]]; then
            echo "Checked out $CURRENT_HEAD, expected review head $TARGET_SHA." >&2
            exit 1
          fi
          echo "REVIEW_REPO_ROOT=$PWD" >> "$GITHUB_ENV"

      - name: Preflight review trigger
        run: |
          cd "$REVIEW_REPO_ROOT"
          python3 scripts/lib/opencode-managed-workflow-context.py --context review-trigger --emit env

      - name: Expose host CLI tools
        if: ${{ env.OPENCODE_REVIEW_TRIGGER_MATCHED == '1' }}
        run: |
          HOST_HOME="$(eval echo "~$(whoami)")"
          echo "HOST_HOME=$HOST_HOME" >> "$GITHUB_ENV"
          echo "$HOST_HOME/.opencode/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          export PATH="$HOST_HOME/.opencode/bin:/opt/homebrew/bin:$PATH"

      - name: Load managed review settings
        if: ${{ env.OPENCODE_REVIEW_TRIGGER_MATCHED == '1' }}
        run: |
          cd "$REVIEW_REPO_ROOT"
          python3 scripts/lib/opencode-managed-workflow-context.py --context review-settings --emit env

      - name: Skip bootstrap setup PR review
        if: ${{ env.OPENCODE_REVIEW_TRIGGER_MATCHED == '1' && github.event_name == 'pull_request' && github.head_ref == env.OPENCODE_SETUP_BRANCH }}
        run: echo "Bootstrap setup PR detected; skipping controller review worker."

      - name: Check out controller repository
        if: ${{ env.OPENCODE_REVIEW_TRIGGER_MATCHED == '1' && (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) }}
        run: |
          umask 077
          cat > "$HOME/.netrc" <<EOF
          machine git.ultramac.work
          login "review-bot"
          password ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
          EOF
          git clone "https://git.ultramac.work/${OPENCODE_CONTROLLER_REPOSITORY}.git" controller
          rm -f "$HOME/.netrc"
          echo "REVIEW_CONTROLLER_ROOT=$PWD/controller" >> "$GITHUB_ENV"

      - name: Resolve Python with working venv
        if: ${{ env.OPENCODE_REVIEW_TRIGGER_MATCHED == '1' && (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) }}
        run: |
          cd "$REVIEW_CONTROLLER_ROOT"
          source scripts/lib/python_runtime.sh
          opencode_export_python_bin
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          echo "REVIEW_BOT_VENV=$REVIEW_CONTROLLER_ROOT/.review-bot-venv" >> "$GITHUB_ENV"

      - name: Install controller dependencies
        if: ${{ env.OPENCODE_REVIEW_TRIGGER_MATCHED == '1' && (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) }}
        run: |
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -m venv "$REVIEW_BOT_VENV"
          "$REVIEW_BOT_VENV/bin/python" --version
          "$REVIEW_BOT_VENV/bin/python" -m pip install -r "$REVIEW_CONTROLLER_ROOT/shared/requirements.txt"

      - name: Verify host OpenCode runtime
        if: ${{ env.OPENCODE_REVIEW_TRIGGER_MATCHED == '1' && (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) }}
        run: |
          export HOME="$HOST_HOME"
          export PATH="$HOME/.opencode/bin:/opt/homebrew/bin:$PATH"
          zsh -lc '
            echo "HOME=$HOME"
            echo "PATH=$PATH"
            which opencode
            opencode --version
            opencode auth list
            "'"$REVIEW_BOT_VENV"'/bin/python" --version
          '

      - name: Run review worker
        if: ${{ env.OPENCODE_REVIEW_TRIGGER_MATCHED == '1' && (github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH) }}
        run: |
          cd "$REVIEW_REPO_ROOT"
          export HOME="$HOST_HOME"
          export PATH="$HOME/.opencode/bin:/opt/homebrew/bin:$PATH"
          OPENCODE_DEFAULT_BRANCH="${GITHUB_BASE_REF:-}"
          if [[ -z "$OPENCODE_DEFAULT_BRANCH" ]]; then
            OPENCODE_DEFAULT_BRANCH="$(git ls-remote --symref origin HEAD | awk '/^ref:/ { sub("refs/heads/", "", $2); print $2; exit }')"
          fi
          if [[ -z "$OPENCODE_DEFAULT_BRANCH" ]]; then
            OPENCODE_DEFAULT_BRANCH="main"
          fi
          export OPENCODE_DEFAULT_BRANCH
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "project_key": os.environ["OPENCODE_PROJECT_KEY"],
              "repo_owner": os.environ["OPENCODE_REPO_OWNER"],
              "repo_name": os.environ["OPENCODE_REPO_NAME"],
              "default_branch": os.environ["OPENCODE_DEFAULT_BRANCH"],
              "review_local_test_command": os.environ["OPENCODE_VALIDATION_COMMAND"],
              "review_local_coverage_command": os.environ["OPENCODE_COVERAGE_COMMAND"],
          }
          Path(".opencode-review-project.json").write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          zsh -lc '
            "'"$REVIEW_BOT_VENV"'/bin/python" "$REVIEW_CONTROLLER_ROOT/scripts/review_worker.py" \
              --repo-root "$REVIEW_REPO_ROOT" \
              --config "$PWD/.opencode-review-project.json" \
              --automation-config "$REVIEW_CONTROLLER_ROOT/automation.json" \
              --event-name "$GITHUB_EVENT_NAME" \
              --event-path "$GITHUB_EVENT_PATH"
          '
