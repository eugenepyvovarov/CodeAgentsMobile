name: OpenCode Validation

"on":
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-ultramac
    timeout-minutes: 10
    env:
      GIT_SSL_NO_VERIFY: "1"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      OPENCODE_MANAGED_CONFIG: "project/opencode-managed.json"
    steps:
      - name: Allow internal self-signed Git over HTTPS
        run: git config --global http.sslVerify false

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Load managed validation settings
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          config = json.loads(Path("project/opencode-managed.json").read_text(encoding="utf-8"))
          assert config["schema_version"] == 1
          controller = config["controller"]
          assert controller["repository"]
          assert controller["setup_branch"]
          review = config["review"]
          assert review["persona"]
          assert review["persona_token_secret"].startswith("OPENCODE_PERSONA_")
          validation = config["validation"]
          assert validation["command"]
          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as handle:
              handle.write(f"OPENCODE_SETUP_BRANCH={controller['setup_branch']}\n")
              handle.write(f"OPENCODE_VALIDATION_COMMAND={validation['command']}\n")
          print("managed validation config ok")
          PY

      - name: Show Python version
        if: ${{ github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH }}
        run: python --version

      - name: Run repository validation command
        if: ${{ github.event_name != 'pull_request' || github.head_ref != env.OPENCODE_SETUP_BRANCH }}
        run: /bin/bash -lc "$OPENCODE_VALIDATION_COMMAND"

      - name: Skip repo validation for bootstrap setup PR
        if: ${{ github.event_name == 'pull_request' && github.head_ref == env.OPENCODE_SETUP_BRANCH }}
        run: echo "Bootstrap setup PR detected; skipping repository validation command."
