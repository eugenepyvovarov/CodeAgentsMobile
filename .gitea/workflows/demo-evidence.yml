name: OpenCode Final Demo Media

"on":
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Merged pull request number to finalize demo media from the retained preview
        required: true
      head_sha:
        description: Authoritative final-demo target SHA for preview readiness and evidence comments
        required: true

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      controller_repository: ${{ steps.managed-config.outputs.controller_repository }}
      setup_branch: ${{ steps.managed-config.outputs.setup_branch }}
      project_key: ${{ steps.managed-config.outputs.project_key }}
      preview_supported: ${{ steps.managed-config.outputs.preview_supported }}
      demo_supported: ${{ steps.managed-config.outputs.demo_supported }}
      demo_provider: ${{ steps.managed-config.outputs.demo_provider }}
      demo_platform: ${{ steps.managed-config.outputs.demo_platform }}
      demo_evidence_supported: ${{ steps.managed-config.outputs.demo_evidence_supported }}
      demo_playwright_web_supported: ${{ steps.managed-config.outputs.demo_playwright_web_supported }}
      demo_native_macos_supported: ${{ steps.managed-config.outputs.demo_native_macos_supported }}
      demo_native_ios_simulator_supported: ${{ steps.managed-config.outputs.demo_native_ios_simulator_supported }}
    env:
      GIT_SSL_NO_VERIFY: "1"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      OPENCODE_MANAGED_CONFIG: "project/opencode-managed.json"
      OPENCODE_REPO_OWNER: ${{ secrets.OPENCODE_REPO_OWNER }}
      OPENCODE_REPO_NAME: ${{ secrets.OPENCODE_REPO_NAME }}
      OPENCODE_ACTIVITY_INGEST_URL: ${{ secrets.OPENCODE_ACTIVITY_INGEST_URL }}
      OPENCODE_ACTIVITY_INGEST_TOKEN: ${{ secrets.OPENCODE_ACTIVITY_INGEST_TOKEN }}
    steps:
      - name: Allow internal self-signed Git over HTTPS
        run: git config --global http.sslVerify false

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load managed demo settings
        id: managed-config
        run: |
          python3 scripts/lib/opencode-managed-workflow-context.py --context demo-evidence-preflight --emit output

  demo-evidence-playwright:
    needs: preflight
    if: ${{ github.ref_name != needs.preflight.outputs.setup_branch && needs.preflight.outputs.preview_supported == 'true' && needs.preflight.outputs.demo_playwright_web_supported == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: git.ultramac.work/eugene/opencode-gitea-automation/playwright-evidence-runner:1.54.0-r2
      credentials:
        username: review-bot
        password: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
    timeout-minutes: 10
    env:
      GIT_SSL_NO_VERIFY: "1"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      OPENCODE_MANAGED_CONFIG: "project/opencode-managed.json"
      OPENCODE_REPO_OWNER: ${{ secrets.OPENCODE_REPO_OWNER }}
      OPENCODE_REPO_NAME: ${{ secrets.OPENCODE_REPO_NAME }}
      OPENCODE_ACTIVITY_INGEST_URL: ${{ secrets.OPENCODE_ACTIVITY_INGEST_URL }}
      OPENCODE_ACTIVITY_INGEST_TOKEN: ${{ secrets.OPENCODE_ACTIVITY_INGEST_TOKEN }}
      OPENCODE_CONTROLLER_TOKEN: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
      OPENCODE_PERSONA_REVIEW_BOT_TOKEN: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
    steps:
      - name: Allow internal self-signed Git over HTTPS
        shell: bash
        run: git config --global http.sslVerify false

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out controller repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.preflight.outputs.controller_repository }}
          path: controller
          token: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
          fetch-depth: 0

      - name: Resolve Python with working venv
        shell: bash
        run: |
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          export PATH="/opt/homebrew/bin:$PATH"
          source controller/scripts/lib/python_runtime.sh
          opencode_export_python_bin
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          echo "DEMO_EVIDENCE_VENV=$PWD/.demo-evidence-venv" >> "$GITHUB_ENV"

      - name: Install controller dependencies
        shell: bash
        run: |
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -m venv "$DEMO_EVIDENCE_VENV"
          "$DEMO_EVIDENCE_VENV/bin/python" --version
          "$DEMO_EVIDENCE_VENV/bin/python" -m pip install -r controller/shared/requirements.txt

      - name: Run retained-preview final demo media worker
        shell: bash
        run: |
          OPENCODE_DEFAULT_BRANCH="${GITHUB_BASE_REF:-}"
          if [[ -z "$OPENCODE_DEFAULT_BRANCH" ]]; then
            OPENCODE_DEFAULT_BRANCH="$(git ls-remote --symref origin HEAD | awk '/^ref:/ { sub("refs/heads/", "", $2); print $2; exit }')"
          fi
          if [[ -z "$OPENCODE_DEFAULT_BRANCH" ]]; then
            OPENCODE_DEFAULT_BRANCH="main"
          fi
          export OPENCODE_DEFAULT_BRANCH
          cat > .opencode-demo-project.json <<EOF
          {
            "project_key": "${{ needs.preflight.outputs.project_key }}",
            "repo_owner": "$OPENCODE_REPO_OWNER",
            "repo_name": "$OPENCODE_REPO_NAME",
            "default_branch": "$OPENCODE_DEFAULT_BRANCH"
          }
          EOF
          ACTIVITY_LOG="$PWD/.opencode-demo-evidence-activity.log"
          ACTIVITY_KEY="demo-evidence:pr-${{ inputs.pull_request_number }}:${{ inputs.head_sha }}"
          "$DEMO_EVIDENCE_VENV/bin/python" controller/scripts/activity_event.py --best-effort --ingest-url "$OPENCODE_ACTIVITY_INGEST_URL" --ingest-token "$OPENCODE_ACTIVITY_INGEST_TOKEN" --repo-root "$PWD" --project-key "${{ needs.preflight.outputs.project_key }}" --repo-owner "$OPENCODE_REPO_OWNER" --repo-name "$OPENCODE_REPO_NAME" --worker workflow --action-type demo-evidence --phase artifact-upload --status running --pull-request-number "${{ inputs.pull_request_number }}" --head-sha "${{ inputs.head_sha }}" --external-key "$ACTIVITY_KEY" --summary "Final demo media capture running"
          set +e
          "$DEMO_EVIDENCE_VENV/bin/python" controller/scripts/demo_evidence_worker.py \
            --repo-root "$PWD" \
            --config "$PWD/.opencode-demo-project.json" \
            --automation-config "$PWD/controller/automation.json" \
            --event-name "$GITHUB_EVENT_NAME" \
            --event-path "$GITHUB_EVENT_PATH" 2>&1 | tee "$ACTIVITY_LOG"
          STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$STATUS" -eq 0 ]; then
            "$DEMO_EVIDENCE_VENV/bin/python" controller/scripts/activity_event.py --best-effort --ingest-url "$OPENCODE_ACTIVITY_INGEST_URL" --ingest-token "$OPENCODE_ACTIVITY_INGEST_TOKEN" --repo-root "$PWD" --project-key "${{ needs.preflight.outputs.project_key }}" --repo-owner "$OPENCODE_REPO_OWNER" --repo-name "$OPENCODE_REPO_NAME" --worker workflow --action-type demo-evidence --phase artifact-upload --status success --pull-request-number "${{ inputs.pull_request_number }}" --head-sha "${{ inputs.head_sha }}" --external-key "$ACTIVITY_KEY" --summary "Final demo media capture completed"
          else
            "$DEMO_EVIDENCE_VENV/bin/python" controller/scripts/activity_event.py --best-effort --ingest-url "$OPENCODE_ACTIVITY_INGEST_URL" --ingest-token "$OPENCODE_ACTIVITY_INGEST_TOKEN" --repo-root "$PWD" --project-key "${{ needs.preflight.outputs.project_key }}" --repo-owner "$OPENCODE_REPO_OWNER" --repo-name "$OPENCODE_REPO_NAME" --worker workflow --action-type demo-evidence --phase artifact-upload --status failed --reason "worker-exit-$STATUS" --pull-request-number "${{ inputs.pull_request_number }}" --head-sha "${{ inputs.head_sha }}" --external-key "$ACTIVITY_KEY" --summary "Final demo media capture failed" --failed-log-file "$ACTIVITY_LOG"
            exit "$STATUS"
          fi

