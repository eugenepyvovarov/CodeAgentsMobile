          set -e
          if [ "$STATUS" -eq 0 ]; then
            "$DEMO_EVIDENCE_VENV/bin/python" controller/scripts/activity_event.py --best-effort --ingest-url "$OPENCODE_ACTIVITY_INGEST_URL" --ingest-token "$OPENCODE_ACTIVITY_INGEST_TOKEN" --repo-root "$PWD" --project-key "${{ needs.preflight.outputs.project_key }}" --repo-owner "$OPENCODE_REPO_OWNER" --repo-name "$OPENCODE_REPO_NAME" --worker workflow --action-type demo-evidence --phase artifact-upload --status success --pull-request-number "${{ inputs.pull_request_number }}" --head-sha "${{ inputs.head_sha }}" --external-key "$ACTIVITY_KEY" --summary "Native final demo media capture completed"
          else
            "$DEMO_EVIDENCE_VENV/bin/python" controller/scripts/activity_event.py --best-effort --ingest-url "$OPENCODE_ACTIVITY_INGEST_URL" --ingest-token "$OPENCODE_ACTIVITY_INGEST_TOKEN" --repo-root "$PWD" --project-key "${{ needs.preflight.outputs.project_key }}" --repo-owner "$OPENCODE_REPO_OWNER" --repo-name "$OPENCODE_REPO_NAME" --worker workflow --action-type demo-evidence --phase artifact-upload --status failed --reason "worker-exit-$STATUS" --pull-request-number "${{ inputs.pull_request_number }}" --head-sha "${{ inputs.head_sha }}" --external-key "$ACTIVITY_KEY" --summary "Native final demo media capture failed" --failed-log-file "$ACTIVITY_LOG"
            exit "$STATUS"
