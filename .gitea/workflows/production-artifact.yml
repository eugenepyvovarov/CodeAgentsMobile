name: OpenCode Production Artifact

"on":
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Merged pull request number to build the pinned production artifact for
        required: true

permissions:
  contents: read

jobs:
  production-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GIT_SSL_NO_VERIFY: "1"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      OPENCODE_MANAGED_CONFIG: "project/opencode-managed.json"
      OPENCODE_REPO_OWNER: ${{ secrets.OPENCODE_REPO_OWNER }}
      OPENCODE_REPO_NAME: ${{ secrets.OPENCODE_REPO_NAME }}
      GITEA_TOKEN: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
    steps:
      - name: Allow internal self-signed Git over HTTPS
        run: git config --global http.sslVerify false

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        run: |
          PYTHON_BIN="$(command -v python3)"
          echo "PYTHON_BIN=$PYTHON_BIN" >> "$GITHUB_ENV"
          echo "PRODUCTION_ARTIFACT_VENV=$PWD/.production-artifact-venv" >> "$GITHUB_ENV"

      - name: Load managed production-artifact settings
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          config = json.loads(Path("project/opencode-managed.json").read_text(encoding="utf-8"))
          assert config["schema_version"] == 1
          controller = config["controller"]
          assert controller["repository"]
          assert controller["setup_branch"]
          review = config["review"]
          assert review["persona"]
          assert review["persona_token_secret"].startswith("OPENCODE_PERSONA_")
          validation = config["validation"]
          assert validation["workflow"] == ".gitea/workflows/pr-tests.yml"
          production_artifact = config["production_artifact"]
          assert production_artifact["workflow"] == ".gitea/workflows/production-artifact.yml"
          assert isinstance(production_artifact["supported"], bool)
          assert production_artifact["result"]["format"] == "json"
          assert production_artifact["result"]["transport"] == "stdout"
          owner = os.environ["OPENCODE_REPO_OWNER"].strip()
          repo = os.environ["OPENCODE_REPO_NAME"].strip()
          raw = f"{owner}-{repo}".lower()
          project_key = re.sub(r"[^a-z0-9]+", "-", raw).strip("-")
          project_key = re.sub(r"-{2,}", "-", project_key)
          if not project_key:
              raise SystemExit("Unable to derive project key from repository owner/name")
          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as handle:
              handle.write(f"OPENCODE_CONTROLLER_REPOSITORY={controller['repository']}\n")
              handle.write(f"OPENCODE_SETUP_BRANCH={controller['setup_branch']}\n")
              handle.write(f"OPENCODE_PROJECT_KEY={project_key}\n")
              handle.write(
                  f"OPENCODE_PRODUCTION_ARTIFACT_SUPPORTED={'true' if production_artifact['supported'] else 'false'}\n"
              )
          print("managed production-artifact config ok")
          PY

      - name: Skip bootstrap setup PR production-artifact workflow
        if: ${{ github.ref_name == env.OPENCODE_SETUP_BRANCH }}
        run: echo "Bootstrap setup PR detected; skipping production-artifact workflow."

      - name: Skip repositories without production-artifact support
        if: ${{ github.ref_name != env.OPENCODE_SETUP_BRANCH && env.OPENCODE_PRODUCTION_ARTIFACT_SUPPORTED != 'true' }}
        run: echo "Managed repository does not declare supported production-artifact finalization; skipping."

      - name: Check out controller repository
        if: ${{ github.ref_name != env.OPENCODE_SETUP_BRANCH && env.OPENCODE_PRODUCTION_ARTIFACT_SUPPORTED == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPENCODE_CONTROLLER_REPOSITORY }}
          path: controller
          token: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
          fetch-depth: 0

      - name: Install controller dependencies
        if: ${{ github.ref_name != env.OPENCODE_SETUP_BRANCH && env.OPENCODE_PRODUCTION_ARTIFACT_SUPPORTED == 'true' }}
        run: |
          "$PYTHON_BIN" --version
          "$PYTHON_BIN" -m venv "$PRODUCTION_ARTIFACT_VENV"
          "$PRODUCTION_ARTIFACT_VENV/bin/python" --version
          "$PRODUCTION_ARTIFACT_VENV/bin/python" -m pip install -r controller/shared/requirements.txt

      - name: Run pinned production-artifact worker
        if: ${{ github.ref_name != env.OPENCODE_SETUP_BRANCH && env.OPENCODE_PRODUCTION_ARTIFACT_SUPPORTED == 'true' }}
        run: |
          cat > .opencode-production-artifact-project.json <<EOF
          {
            "project_key": "$OPENCODE_PROJECT_KEY",
            "repo_owner": "$OPENCODE_REPO_OWNER",
            "repo_name": "$OPENCODE_REPO_NAME"
          }
          EOF
          "$PRODUCTION_ARTIFACT_VENV/bin/python" controller/scripts/production_artifact_worker.py \
            --repo-root "$PWD" \
            --config "$PWD/.opencode-production-artifact-project.json" \
            --automation-config "$PWD/controller/automation.json" \
            --event-name "$GITHUB_EVENT_NAME" \
            --event-path "$GITHUB_EVENT_PATH"
