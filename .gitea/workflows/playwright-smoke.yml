name: OpenCode Playwright Smoke

"on":
  workflow_call:
    inputs:
      head_sha:
        description: Expected pull request head SHA to smoke test
        required: true
        type: string
  workflow_dispatch:
    inputs:
      head_sha:
        description: Expected pull request head SHA to smoke test
        required: true

permissions:
  contents: read

jobs:
  playwright-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GIT_SSL_NO_VERIFY: "1"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      OPENCODE_MANAGED_CONFIG: "project/opencode-managed.json"
      OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE: "git.ultramac.work/eugene/opencode-gitea-automation/playwright-evidence-runner:1.54.0-r4"
      OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_CONTRACT_VERSION: "1"
      OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_ENTRYPOINT: "/usr/local/bin/playwright-evidence-runner"
      OPENCODE_PERSONA_REVIEW_BOT_TOKEN: ${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}
    steps:
      - name: Allow internal self-signed Git over HTTPS
        run: git config --global http.sslVerify false

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha }}

      - name: Load managed Playwright smoke settings
        run: |
          python3 scripts/lib/opencode-managed-workflow-context.py --context playwright-smoke --emit env

      - name: Skip repositories without supported web Playwright smoke coverage
        if: ${{ env.OPENCODE_PLAYWRIGHT_SMOKE_SUPPORTED != 'true' || env.OPENCODE_PLAYWRIGHT_SMOKE_PROVIDER != 'playwright' || env.OPENCODE_PLAYWRIGHT_SMOKE_PLATFORM != 'web' }}
        run: echo "Managed repository does not declare supported web Playwright smoke coverage; skipping."

      - name: Authenticate shared Playwright evidence runner image pull access
        if: ${{ env.OPENCODE_PLAYWRIGHT_SMOKE_SUPPORTED == 'true' && env.OPENCODE_PLAYWRIGHT_SMOKE_PROVIDER == 'playwright' && env.OPENCODE_PLAYWRIGHT_SMOKE_PLATFORM == 'web' }}
        run: echo "${{ secrets.OPENCODE_PERSONA_REVIEW_BOT_TOKEN }}" | docker login git.ultramac.work -u "review-bot" --password-stdin

      - name: Require shared Playwright evidence runner image
        if: ${{ env.OPENCODE_PLAYWRIGHT_SMOKE_SUPPORTED == 'true' && env.OPENCODE_PLAYWRIGHT_SMOKE_PROVIDER == 'playwright' && env.OPENCODE_PLAYWRIGHT_SMOKE_PLATFORM == 'web' }}
        run: |
          if [[ -z "${OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE:-}" ]]; then
            echo "OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE is required for web Playwright smoke evidence; host Playwright/node_modules fallback is not supported." >&2
            exit 1
          fi
          docker pull "$OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE"

      - name: Run repository Playwright smoke command through shared runner
        if: ${{ env.OPENCODE_PLAYWRIGHT_SMOKE_SUPPORTED == 'true' && env.OPENCODE_PLAYWRIGHT_SMOKE_PROVIDER == 'playwright' && env.OPENCODE_PLAYWRIGHT_SMOKE_PLATFORM == 'web' }}
        run: |
          ARTIFACT_DIR="$PWD/.opencode/playwright-smoke"
          mkdir -p "$ARTIFACT_DIR"
          WORKSPACE_CONTAINER="${OPENCODE_WORKSPACE_CONTAINER:-${HOSTNAME:-}}"
          DOCKER_WORKSPACE_ARGS=(-v "$PWD:$PWD")
          if [[ -n "$WORKSPACE_CONTAINER" ]] && docker inspect "$WORKSPACE_CONTAINER" >/dev/null 2>&1; then
            DOCKER_WORKSPACE_ARGS=(--volumes-from "$WORKSPACE_CONTAINER")
          fi
          docker run --rm \
            "${DOCKER_WORKSPACE_ARGS[@]}" \
            -w "$PWD" \
            -e "OPENCODE_EVIDENCE_MODE=preflight" \
            -e "OPENCODE_REPO_ROOT=$PWD" \
            -e "OPENCODE_ARTIFACT_DIR=$ARTIFACT_DIR" \
            -e "OPENCODE_TARGET_URL=about:blank" \
            -e "OPENCODE_SCENARIO_COMMAND=$OPENCODE_PLAYWRIGHT_SMOKE_COMMAND" \
            -e "OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE=$OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE" \
            -e "CI=${CI:-1}" \
            "$OPENCODE_PLAYWRIGHT_EVIDENCE_RUNNER_IMAGE"
